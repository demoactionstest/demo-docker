name: Build Docker

on: 
  workflow_dispatch: # Permite rodar manualmente para testes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
      packages: write # Essencial para salvar no GitHub Packages

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Senha automática do GitHub

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Faz o upload para o GitHub
          tags: ghcr.io/${{ github.repository }}:latest # Nome da imagem
             
